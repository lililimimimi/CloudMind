<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">CloudMind ECS promotion poster</title>
  <desc id="desc">A futuristic cloud server promotion poster with blue lighting.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="920" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d3b8f"/>
      <stop offset="0.48" stop-color="#1465f4"/>
      <stop offset="1" stop-color="#19b6c8"/>
    </linearGradient>
    <linearGradient id="panel" x1="240" y1="220" x2="784" y2="850" gradientUnits="userSpaceOnUse">
